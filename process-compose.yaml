version: "0.5"

log_location: .logs/process-compose.log

processes:
  auth:
    command: bash -c "cd services/auth && nix develop --command just run"
    availability:
      restart: on_failure
      max_restarts: 3

  api:
    command: bash -c "cd services/api && nix develop --command just run"
    availability:
      restart: on_failure
      max_restarts: 3

  pdf-worker:
    command: bash -c "cd services/pdf-worker && nix develop --command just run"
    availability:
      restart: on_failure
      max_restarts: 10
      backoff_seconds: 3

  frontend:
    command: bash -c "cd frontend && nix develop --command just run"
    depends_on:
      api:
        condition: process_started
      auth:
        condition: process_started
    availability:
      restart: on_failure
      max_restarts: 3
