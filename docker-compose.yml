# Dissona Development Environment
# Run: docker compose up -d

services:
  # ============ DATABASES ============

  postgres-auth:
    image: postgres:16
    ports:
      - "5435:5432"  # Changed from 5432 (in use by dissona-postgres)
    environment:
      POSTGRES_USER: dissona_auth
      POSTGRES_PASSWORD: dissona_auth
      POSTGRES_DB: dissona_auth
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dissona_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-api:
    image: postgres:16
    ports:
      - "5434:5432"  # Changed from 5433 (in use by luna-postgres)
    environment:
      POSTGRES_USER: dissona
      POSTGRES_PASSWORD: dissona
      POSTGRES_DB: dissona
    volumes:
      - postgres-api-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dissona"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============ GATEWAY ============

  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
      - "--accesslog.format=json"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

